<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>404 — Страница не найдена</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Inter, sans-serif;
      background: radial-gradient(circle at right, #f3e9e6, #faf7f5);
      color: #2b2b2b;
      height: 100vh;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center; /* центрируем */
      text-align: center;      /* центрируем текст */
      padding: 0 8%;
    }

    .content {
      max-width: 520px;
      z-index: 2;
    }

    /* --- 404 --- */
    .code {
      font-size: 160px;
      font-weight: 800;
      color: #7b2e2e;
      line-height: 1;
      margin-bottom: 24px;
    }

    .code span {
      display: inline-block;
    }

    .code .one {
      transform: translateY(-14px);
      opacity: 0.55;
    }

    .code .zero {
      transform: translateY(10px);
      opacity: 0.9;
    }

    .code .two {
      transform: translateY(-6px);
      opacity: 0.7;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 26px;
      background: #7b2e2e;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      transition: transform .25s ease, box-shadow .25s ease;
      box-shadow: 0 8px 24px rgba(123,46,46,.25);
    }

    .btn:hover {
      transform: translateX(6px);
      box-shadow: 0 12px 30px rgba(123,46,46,.35);
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
    }

    /* --- Responsive --- */
    @media (max-width: 900px) {
      .code {
        font-size: 120px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="content">
      <div class="code">
        <span class="one">4</span>
        <span class="zero">0</span>
        <span class="two">4</span>
      </div>

      <h1>Страница не отвечает</h1>

      <p>
        Похоже, этого раздела пока не существует.<br>
        Возможно, он ещё в разработке — или ссылка устарела.
      </p>

      <a href="/" class="btn">Вернуться на главную →</a>

      <div class="hint">Ошибка 404 · Grade</div>
    </div>
  </div>
</body>
</html>
